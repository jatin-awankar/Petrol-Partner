services:
  - type: redis
    name: petrol-partner-redis
    plan: starter
    maxmemoryPolicy: noeviction

  - type: web
    name: petrol-partner-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /v1/ready
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: "true"
      - key: APP_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: petrol-partner-redis
          property: connectionString
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: COOKIE_DOMAIN
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ENABLE_CHAT
        value: "false"
      - key: ENABLE_TRACKING
        value: "false"
      - key: ENABLE_MATCH_REFRESH_PROCESSOR
        value: "true"

  - type: worker
    name: petrol-partner-worker
    runtime: node
    rootDir: apps/worker
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: petrol-partner-redis
          property: connectionString
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: LOG_LEVEL
        value: info
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAINTENANCE_SWEEP_INTERVAL_MS
        value: "60000"
